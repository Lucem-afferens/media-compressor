# Set in GitHub → Settings → Secrets → Actions after creating a Deploy Hook in Render.
# Render Dashboard → your service → Settings → Deploy Hook → Create hook
# https://render.com/docs/deploy-hooks

name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skip (enable in GitHub repo secrets)."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Deploy hook triggered."
